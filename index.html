<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEJIRE AI — Цифровое Наследие Кочевников</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-void: #080808;
            --bg-surface: #0D0D0D;
            --gold-primary: #C5A55A;
            --gold-deep: #8B6914;
            --gold-glow: rgba(197, 165, 90, 0.15);
            --node-w: 180px;
            --node-w-deep: 140px;
        }

        @media (max-width: 768px) {
            :root {
                --node-w: 140px;
                --node-w-deep: 110px;
            }
        }

        body {
            background-color: var(--bg-void);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .gold-pill {
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-deep) 100%);
            color: black;
        }

        .glass-card {
            background: var(--bg-surface);
            border: 1px solid #1a1a1a;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(197, 165, 90, 0.4);
            box-shadow: 0 0 30px var(--gold-glow);
            transform: translateY(-4px);
        }

        .tamga-glow {
            text-shadow: 0 0 15px rgba(197, 165, 90, 0.6);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }

            50% {
                transform: translateY(-40px) translateX(20px);
                opacity: 0.8;
            }
        }

        @keyframes tokenFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes tokenGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(74, 222, 128, 0.6)) drop-shadow(0 0 60px rgba(197, 165, 90, 0.3));
            }
        }

        .animate-float {
            animation: float 10s ease-in-out infinite;
        }

        .token-card {
            animation: tokenFloat 3s ease-in-out infinite, tokenGlow 4s ease-in-out infinite;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #080808;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-primary);
        }

        /* ── Tree animations ── */
        @keyframes pulseGold {
            0%, 100% { box-shadow: 0 0 16px rgba(197,165,90,0.18), 0 4px 20px rgba(0,0,0,0.5); }
            50%       { box-shadow: 0 0 36px rgba(197,165,90,0.48), 0 0 60px rgba(197,165,90,0.14), 0 4px 20px rgba(0,0,0,0.5); }
        }
        @keyframes lineGlow {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 0.9; }
        }
        @keyframes nodeReveal {
            from { opacity: 0; transform: translateY(-14px) scale(0.93); }
            to   { opacity: 1; transform: translateY(0)     scale(1); }
        }
        @keyframes dotPulse {
            0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.7; }
            50%       { transform: translate(-50%,-50%) scale(1.6); opacity: 1; }
        }
        .tree-node-main  { animation: pulseGold 3.2s ease-in-out infinite; }
        .tree-line-main  { animation: lineGlow  2.5s ease-in-out infinite; }
        .tree-dot-main   { animation: dotPulse  2s   ease-in-out infinite; }

        /* ── Print / PDF ── */
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: #080808 !important; margin:0; padding:0; }
            #root > div > * { display: none !important; }
            #cert-printable  { display: flex !important; }
            #nft-print-area  { display: flex !important; }
            @page { margin: 0; size: A4 portrait; }
        }
        #cert-printable { display: none; }
        #nft-print-area { display: none; }

        /* NFT card shimmer */
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        .nft-shimmer {
            background: linear-gradient(90deg, transparent 0%, rgba(197,165,90,0.08) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes starPulse {
            0%,100% { opacity:.15; transform:scale(1); }
            50%      { opacity:.6;  transform:scale(1.3); }
        }

        /* Profile gradient ring */
        .profile-ring {
            background: conic-gradient(#C5A55A 0%, #8B6914 40%, #C5A55A10 60%, #C5A55A 100%);
            padding: 2px; border-radius: 9999px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        const ZHUZES = {

        const TRIBES_DB = {

            shanyshqyly: { name: "ШАНЫШҚЫЛЫ", juz: ZHUZES.ULY, tamga: "⋔", tamgaName: "Шанышқы", color: "#C5A55A", story: "Шанышқылы — воинственное племя Старшего жуза. Исторически связаны с Канджыгалы. Сыграли важную роль в защите южных рубежей Казахского ханства." },
            sirgeli: { name: "СІРГЕЛІ", juz: ZHUZES.ULY, tamga: "⊓", tamgaName: "Сірге", color: "#C5A55A", story: "Сиргели получили название от знака 'сирге' — путы для жеребят. Это племя славилось своими табунами и мастерством в коневодстве." },
            shaqsham: { name: "ШАҚШАМ", juz: ZHUZES.ULY, tamga: "ᗕ", tamgaName: "Тамға", color: "#C5A55A", story: "Малочисленное, но гордое объединение в составе Старшего жуза, сохранившее свою идентичность через века." },
            saryuysin: { name: "САРЫҮЙСІН", juz: ZHUZES.ULY, tamga: "⚭", tamgaName: "Абақ", color: "#C5A55A", story: "Прямые наследники древних Усуней, господствовавших в Семиречье в античную эпоху. 'Сары' указывает на древность или благородство происхождения." },
            shapyrashty: { name: "ШАПЫРАШТЫ", juz: ZHUZES.ULY, tamga: "∀", tamgaName: "Айыр", color: "#C5A55A", story: "Шапырашты — стражи Жетысу. Из этого рода вышли многие батыры, защищавшие Алматинский регион от набегов джунгар." },
            jalayir: { name: "ЖАЛАЙЫР", juz: ZHUZES.ULY, tamga: "⫙", tamgaName: "Тарақ", color: "#C5A55A", story: "Жалайыры — одно из самых влиятельных племен в империи Чингисхана. Мукали-гоо-ван, правая рука Чингисхана, был жалайыром. В Казахском ханстве считались 'ноқта ағасы' — первенствующими в Старшем жузе." },

            suan: { name: "СУАН", juz: ZHUZES.ULY, tamga: "⩝", tamgaName: "Айыр", color: "#C5A55A", story: "Братское племя Альбанов и Дулатов. Кочевали в предгорьях Джунгарского Алатау." },
            dulat: { name: "ДУЛАТ", juz: ZHUZES.ULY, tamga: "◯", tamgaName: "Дөңгелек", color: "#C5A55A", story: "Дулаты — самое многочисленное племя Старшего жуза. Состояли из четырех крупных родов: Ботпай, Шымыр, Сикым, Жаныс. Фактически контролировали Семиречье веками." },

            argyn: { name: "АРҒЫН", juz: ZHUZES.ORTA, tamga: "△", tamgaName: "Үшкіл", color: "#C5A55A", story: "Аргыны — политический и интеллектуальный каркас Орта жуза. Племя биев, поэтов и дипломатов. Самый многочисленный род казахов сегодня." },
            nayman: { name: "НАЙМАН", juz: ZHUZES.ORTA, tamga: "⩔", tamgaName: "Бақан", color: "#C5A55A", story: "Найманы — наследники великого Найманского ханства. Обладали развитой государственностью и письменностью задолго до возвышения монголов." },
            qonyrat: { name: "ҚОҢЫРАТ", juz: ZHUZES.ORTA, tamga: "⧖", tamgaName: "Босаға", color: "#C5A55A", story: "Коныраты славились своей дипломатией. Из этого рода происходили жены многих ханов, включая Борте, супругу Чингисхана." },
            qypshaq: { name: "ҚЫПШАҚ", juz: ZHUZES.ORTA, tamga: "⊥", tamgaName: "Қос алып", color: "#C5A55A", story: "Кыпчаки — хозяева Великой Степи (Дешт-и-Кыпчак). Их имя наводило трепет от Китая до Византии. Египетские мамлюки имели кыпчакское происхождение." },
            kerey: { name: "КЕРЕЙ", juz: ZHUZES.ORTA, tamga: "🕀", tamgaName: "Абақ", color: "#C5A55A", story: "Кереи — одно из основателей Казахского ханства. Вместе с Жанибеком и Керей-ханами они составили ядро новой нации." },

            // Кіші жүз
            alimuly: { name: "ӘЛІМҰЛЫ", juz: ZHUZES.KISHI, tamga: "⫝", tamgaName: "Шеге", color: "#C5A55A", story: "Алимулы — мощное объединение Младшего жуза. Из этого рода вышел знаменитый батыр Жалантос Бахадур, построивший медресе Шер-Дор в Самарканде." },
            baiuly: { name: "БАЙҰЛЫ", juz: ZHUZES.KISHI, tamga: "⩓", tamgaName: "Таяқ", color: "#C5A55A", story: "Байулы — объединение из 12 родов (Адай, Берш, Шеркеш и др.). Основная сила Западного Казахстана." },
            jetyru: { name: "ЖЕТІРУ", juz: ZHUZES.KISHI, tamga: "⧗", tamgaName: "Жеті", color: "#C5A55A", story: "Жетыру — союз семи родов, созданный по преданиям Тауке-ханом для укрепления обороноспособности степи." },
        };

        const SCREENS = { HOME: 'home', FLOW: 'flow', TREE: 'tree', CUSTOMS: 'customs', TOKEN_INFO: 'token', STORIES: 'stories', GAMES: 'games', FOOD: 'food', DNA: 'dna', CHAT: 'chat', PROFILE: 'profile' };

        // ── База знаний для чата по каждому роду ──
        const TRIBES_KNOWLEDGE = {
            qanly: {
                history: `🏛️ Представь: III век до нашей эры. Рим ещё не покорил мир. Китай только заканчивает Великую стену. А в сердце Центральной Азии уже расцветает мощная держава — Кангюй.\n\nКаңлы — это не просто род. Это потомки целого государства, равного Парфии и Риму. Кангюй контролировал весь Шёлковый путь от Каспия до Памира. Китайские летописи Ханьской эпохи упоминают их как «народ, с которым нужно считаться».\n\n⚔️ Семь веков существования державы. Потом тюркские каганаты поглотили Кангюй — но не стёрли. Каңлы сохранили свою идентичность и через сотни лет вошли в Казахское ханство полноправным родом со своей тамгой, своим батыром и своей гордостью.\n\nСегодня Қаңлы — один из крупнейших родов Старшего жуза. Их кровь хранит память о великой державе.`,
                tamga: `⩚ Тамға «Көсеу» — инструмент для управления огнём очага.\n\nПочему именно огонь? В степи юрта — это весь мир. А огонь в центре юрты — это её сердце. Тот, кто управлял көсеу, управлял теплом, едой, светом — и значит, всей семьёй.\n\n🔥 Каңлы были хранителями не просто очага — они хранили огонь цивилизации Кангюй на протяжении двух тысяч лет.\n\nЖыр: «Өз отыңды өшірме» — Не дай угаснуть своему огню.`,
                famous: `🌟 Великие сыны Қаңлы:\n\n🏗️ Жалантос Бахадур (1576–1656)\n«Казах, построивший жемчужину Самарканда». Он возвёл медресе Шер-Дор и Тилля-Кари на легендарном Регистане. Представь: казахский батыр стал меценатом исламского зодчества! Сорок лет правил Мавераннахром — и сегодня миллионы туристов восхищаются его наследием, не зная, что это создал потомок степи.\n\n👑 Тауке хан (1680–1718)\nЧеловек, которому удалось невозможное — объединить три жуза перед лицом джунгарской угрозы. Его «Жеты Жаргы» — первый казахский кодекс законов — стал основой степного правосудия на века.`,
                traditions: `🏕️ Традиции Қаңлы — живые нити в вечность:\n\n• «Ата мұрасы» — тамга передаётся не просто так. Это обряд: отец берёт горячий уголь тем самым көсеу и рисует знак на правой руке сына. Боль и гордость одновременно.\n\n• «Ошақ мерейі» — три дня после рождения ребёнка огонь в юрте не гасят ни на секунду. Старейшина ночью следит, чтобы он горел.\n\n• Мастера-ювелиры Қаңлы создавали украшения с орнаментом Кангюй — этим украшениям 2000 лет, но их узоры до сих пор живут в казахских шапанах.\n\n• Ежегодный ас с тоғызқұмалақ — игра предков, объединяющая всех.`,
                location: `🗺️ Земля Қаңлы:\n\nДва тысячелетия назад: весь Сырдарьинский регион от Аральского моря до Памира. Шёлковый путь проходил через их землю — а значит, через них шло золото мира.\n\n📍 Сегодня:\n— Жамбылская область (Тараз — древняя столица!)\n— Туркестанская область\n— Кызылординская область\n\nРодовые святыни: долина Таласа, берега Сырдарьи, городище Кангюй близ Туркестана.`
            },
            shanyshqyly: {
                history: `Шанышқылы — воинственный горный род Старшего жуза, обитавший в Жетысу. Тесно связаны с Канжыгалы и исторически служили военной опорой казахских ханов.\n\nОсобую роль сыграли в Аныракайской битве 1730 года — решающей победе над джунгарами, спасшей казахский народ от уничтожения.`,
                tamga: `Тамға «Шанышқы» (⋔) — развилка дорог, символ перепутья и стратегического мышления.\n\nОзначает мудрость выбора пути и умение принять правильное решение в критический момент. Воин Шанышқылы всегда знал, куда идти.`,
                famous: `Атақты адамдар:\n\n★ Жәнібек батыр (XVIII в.)\nГерой Аныракайской битвы. Командовал отрядами Шанышқылы против джунгарского войска. Символ воинской доблести рода.`,
                traditions: `Дәстүрлер:\n\n• «Ат байлау» — ритуал привязывания белого коня у дома новорождённого мальчика — символ будущего воина.\n• Айтыс — поэтические поединки, в которых Шанышқылы особенно сильны.\n• «Жора» — традиция обмена скотом между роднёй при встрече после долгой разлуки.`,
                location: `Мекен:\n\nАлматинская область, предгорья Джунгарского Алатау и Заилийского Алатау. Исторически — восточное Жетысу.`
            },
            sirgeli: {
                history: `Сіргелі — конноводческий род Старшего жуза. Название от «сірге» — путы для жеребят — прямо указывает на их главное занятие.\n\nИсторически занимали Или-Балхашский регион и являлись главными поставщиками лошадей для казахских ханов. Их кони ценились от Сырдарьи до Иртыша.`,
                tamga: `Тамға «Сірге» (⊓) — П-образный символ, изображающий путы коня.\n\nОзначает обуздание силы, дисциплину мастера-коневода. Тот, кто умеет надеть сірге, управляет самой свободной силой степи.`,
                famous: `Атақты адамдар:\n\n★ Тлеуберди батыр (XVIII в.)\nБатыр, участник войны против джунгарского нашествия. Один из защитников восточных рубежей.`,
                traditions: `Дәстүрлер:\n\n• «Жылқы тою» — великий конный праздник с байгой, аударыспаком и кокпаром.\n• «Тұсаукесер» — обряд первого шага ребёнка, в котором участвует белый конь.\n• Секреты выращивания породистых лошадей передаются только внутри рода.`,
                location: `Мекен:\n\nАлматинская и Жамбылская области, долина реки Или. Исторически — Или-Балхашское междуречье.`
            },
            shaqsham: {
                history: `Шақшам — небольшой, но гордый род Старшего жуза. Несмотря на малочисленность, сохранили свою идентичность через века.\n\nПроисходят из древних тюркских племён Семиречья. Всегда держались вместе и поддерживали сильных союзников — это был их главный принцип выживания.`,
                tamga: `Тамға Шақшам символизирует единство малого, но несокрушимого рода.\n\nКак маленький гвоздь удерживает большую конструкцию, так Шақшам — небольшой, но незаменимый элемент Старшего жуза.`,
                famous: `Атақты адамдар:\n\n★ Бии Шақшам\nХранители степного права. Шақшам были известны справедливыми судьями — биями, к которым обращались из соседних родов за решением спорных дел.`,
                traditions: `Дәстүрлер:\n\n• Строгое соблюдение «жеті ата» — запрета на браки до седьмого колена.\n• Традиция арбитража — Шақшам выступают посредниками в межродовых конфликтах.\n• «Бірлік дастархан» — общий стол всего рода минимум раз в год.`,
                location: `Мекен:\n\nТуркестанская и Жамбылская области. Южный Казахстан.`
            },
            saryuysin: {
                history: `Сарыүйсін — прямые наследники древних Усуней (Wusun), господствовавших в Семиречье во II в. до н.э. — II в. н.э. «Сары» означает «золотой/древний», подчёркивая знатность происхождения.\n\nУсуни были союзниками Китая против гуннов и занимали земли от Балхаша до Тянь-Шаня. Их правитель носил титул «гуньмо» и имел армию в 188 000 воинов.`,
                tamga: `Тамға «Абақ» (⚭) — парные кольца, символ вечного союза и преемственности.\n\nОзначает непрерывность цепи поколений от Усуней до наших дней — более 2200 лет истории в одном символе.`,
                famous: `Атақты адамдар:\n\n★ Усунь Гуньмо (II в. до н.э.)\nВеликий правитель Усуней. Заключил союз с Китаем и отразил гуннов. Его дочь вышла замуж за китайского императора.\n\n★ Мухаммад Хайдар Дулати (1499–1551)\nИсторик, написал «Тарих-и-Рашиди» — ценнейший источник по истории казахов и тюркских народов.`,
                traditions: `Дәстүрлер:\n\n• «Ата мерейі» — традиция рассказывать детям историю рода с трёхлетнего возраста.\n• «Ат шауып» — скачки в честь памятных предков.\n• Хранение реликвий Усуньской эпохи — золотых украшений и конской упряжи.`,
                location: `Мекен:\n\nАлматинская область, Жетысу, предгорья Тянь-Шаня. Исторически — от Балхаша до Ферганы.`
            },
            shapyrashty: {
                history: `Шапырашты — стражи Алматинского региона. Исторически защищали восточные рубежи Казахского ханства от джунгарских набегов.\n\nОсобенно прославились в Аныракайской битве 1730 года. Из этого рода вышли многие батыры — защитники Алатау. Суранши батыр стал символом непобедимости рода.`,
                tamga: `Тамға «Айыр» (∀) — двузубые вилы или разряд молнии.\n\nОзначает несокрушимую военную мощь и скорость удара. Как молния раздваивается и бьёт без промаха, так воин Шапырашты поражает цель.`,
                famous: `Атақты адамдар:\n\n★ Суранши батыр (1815–1884)\nЛегендарный защитник Семиречья. Организовал сопротивление внешним угрозам. Национальный герой, чьё имя носят улицы и школы.\n\n★ Баянаул батыр (XVIII в.)\nКомандир отряда в Аныракайской битве. Первым ворвался в ряды джунгар.`,
                traditions: `Дәстүрлер:\n\n• «Сарбаз жолы» — путь воина: особые ритуалы проводов на войну и встречи победителей.\n• Аударыспақ и жамбы ату — обязательные состязания на каждом торжестве.\n• «Жырлау» — исполнение батырских эпосов у костра.`,
                location: `Мекен:\n\nАлматинская область, долина реки Чу и Заилийское Алатау.`
            },
            jalayir: {
                history: `Жалайыр — одно из знатнейших племён Монгольской империи и Казахского ханства. Из этого рода происходил Мукали (Mukhali) — ближайший соратник Чингисхана, получивший титул го-ван.\n\nВ Казахском ханстве Жалайыры занимали особое положение «ноқта ағасы» — первенствующих в Старшем жузе. Их история уходит к протомонгольским племенам.`,
                tamga: `Тамға «Тарақ» (⫙) — расчёска, символ порядка и аристократии.\n\nОзначает: как расчёска упорядочивает волосы, так Жалайыр «расчёсывает» и упорядочивает весь народ. Символ высокого статуса и благородного происхождения.`,
                famous: `Атақты адамдар:\n\n★ Мукали (Мухали) (1170–1223)\nПравая рука Чингисхана. Главнокомандующий на Северном Китае. Получил титул «го-ван» (принц государства). Жалайырского происхождения.\n\n★ Байдибек бий (XIV в.)\nВеликий би и легендарный родоначальник. По преданию, от него и его трёх сыновей произошли многие роды Старшего жуза.`,
                traditions: `Дәстүрлер:\n\n• «Би мырза» — особое уважение к бию как судье и мудрецу рода.\n• Айтыс и красноречие — жалайыры прославились как лучшие ораторы казахской степи.\n• «Той баста» — открытие любого торжества особой молитвой от старейшины рода.`,
                location: `Мекен:\n\nЖамбылская и Туркестанская области, долина Таласа.`
            },
            isty: {
                history: `Ысты — братский род Ошақты в составе Старшего жуза. Известны своим мирным нравом и приверженностью к скотоводству и земледелию.\n\nТесно связаны с историей Туркестана и Сырдарьи. Сохранили древние традиции оседло-кочевой культуры.`,
                tamga: `Тамға «Көсеу» (⩔) — очажный инструмент для углей.\n\nСимвол домашнего тепла, гостеприимства и уюта. Ысты — хранители очага и семейной гармонии.`,
                famous: `Атақты адамдар:\n\n★ Батыры Ысты (XVIII в.)\nВоины, охранявшие южные торговые пути и берега Сырдарьи от набегов.`,
                traditions: `Дәстүрлер:\n\n• «Дастархан мерекесі» — традиция щедрого угощения гостей, за которую Ысты особо уважают.\n• «Ата дуасы» — благословение старейшин при каждом важном событии.\n• Разнообразие национальных блюд — кухня Ысты отличается особым богатством.`,
                location: `Мекен:\n\nТуркестанская и Жамбылская области, берега Сырдарьи.`
            },
            oshaqty: {
                history: `Ошақты получили имя от «ошақ» — трёх камней очага, главного символа казахской юрты.\n\nЭто указывает на их священную роль хранителей домашнего очага. Братский род Ысты. Из их среды выходили лучшие мастера по войлоку — основному строительному материалу степи.`,
                tamga: `Тамға «Ошақ» (⊼) — три камня очага, на которых стоит казан.\n\nТри камня — три опоры мира: небо, земля, человек. Символ стабильности, тепла и объединяющей силы семьи. Самая домашняя тамга казахского народа.`,
                famous: `Атақты адамдар:\n\n★ Устазы Ошақты\nМастера-юртостроители, чьё искусство войлочного производства признавалось лучшим в регионе.`,
                traditions: `Дәстүрлер:\n\n• «Ошақ жағу» — ритуал разжигания первого огня при переезде. Первым огонь разжигает старейшина.\n• Наурыз как праздник нового очага — особо торжественно отмечается.\n• «Кигіз басу» — коллективное изготовление войлока как родовой праздник.`,
                location: `Мекен:\n\nТуркестанская область, берега Сырдарьи и горы Каратау.`
            },
            alban: {
                history: `Албан — горный народ Заилийского Алатау, один из крупнейших родов Старшего жуза. Известны своим непокорным характером и воинской доблестью.\n\nВ 1916 году Албан возглавили восстание против царского указа о трудовой мобилизации. Амангелди Иманов — сын Албана — стал национальным символом борьбы за свободу.`,
                tamga: `Тамға «Айыр» (⧊) — острый раздвоенный инструмент.\n\nСимвол точности и военной доблести. Тот, кто носит эту тамгу, умеет нанести точный удар в нужный момент.`,
                famous: `Атақты адамдар:\n\n★ Амангелді Иманов (1873–1919)\nБатыр и революционный герой. Руководил восстанием 1916 года против колониального указа о призыве. Национальный герой Казахстана, чьё имя носит город.\n\n★ Батыры Аныракая (1730)\nГерои решающей битвы с джунгарами, где Албан сыграли ключевую роль.`,
                traditions: `Дәстүрлер:\n\n• «Ер мерейі» — воинская честь, не позволяющая отступить без боя.\n• «Жасауыл» — старший мужчина рода выступает военным советником.\n• Кузнечное мастерство — Албан славились изготовлением оружия.`,
                location: `Мекен:\n\nАлматинская область, горы Заилийского Алатау и Кетмень.`
            },
            suan: {
                history: `Суан — братский род Албанов и Дулатов. Кочевали в предгорьях Джунгарского Алатау и долине реки Или.\n\nАктивно участвовали во всех крупных войнах Старшего жуза. Отличались верностью союзническому долгу — никогда не предавали своих братьев.`,
                tamga: `Тамға «Айыр» (⩝) — вилообразный символ, родственный тамге Албанов.\n\nОзначает родство трёх братских родов: Суан — Албан — Дулат, которые считаются потомками трёх сыновей одного предка.`,
                famous: `Атақты адамдар:\n\n★ Батыры Суана (XVIII в.)\nВоины, участники антиджунгарского движения. Прославились верностью и бесстрашием.`,
                traditions: `Дәстүрлер:\n\n• «Ата жолы» — ежегодный поминальный ас с конными состязаниями.\n• «Қонақасы» — обязательное угощение любого путника, зашедшего в юрту.\n• Тесные братские связи с Албан и Дулат — совместные тои и родовые съезды.`,
                location: `Мекен:\n\nАлматинская область, предгорья Джунгарского Алатау.`
            },
            dulat: {
                history: `Дулат — самый многочисленный род Старшего жуза, делящийся на четыре ветви: Ботпай, Шымыр, Сикым, Жаныс. Фактически контролировали Жетысу (Семиречье) на протяжении веков.\n\nИз Дулатов вышли крупные политические деятели и просветители. Шормановтар — знатная семья Дулатов — дали Казахстану первых чиновников-реформаторов эпохи XIX века.`,
                tamga: `Тамға «Дөңгелек» (◯) — полный круг, символ совершенства и единства.\n\nСамая чистая тамга: круг без начала и конца — как сам Дулат, который никогда не прерывался и всегда возвращался к своим корням.`,
                famous: `Атақты адамдар:\n\n★ Шормановтар (XIX в.)\nЗнатная семья Дулатов. Дали Казахстану просветителей и первых чиновников, работавших с российской администрацией.\n\n★ Сейфулла Кожаахметов (XIX в.)\nПросветитель, собиратель казахского фольклора и защитник прав кочевников.`,
                traditions: `Дәстүрлер:\n\n• «Шежіре жадысы» — традиция устного сохранения родословной до 12 поколений.\n• «Наурыз той» с обязательным кокпаром и байгой для всех четырёх ветвей.\n• «Той ағасы» — выбор самого уважаемого мужчины для руководства торжеством.`,
                location: `Мекен:\n\nАлматинская, Жамбылская области. Жетысу, долина Или, Чу. Крупнейший род по численности.`
            },
            argyn: {
                history: `📖 Представь степь XVIII века. Среди всех родов Орта жуза есть один, из которого выходят не батыры с саблями — а мудрецы со словом. Это Арғын.\n\n«Арғы» — значит «тот, что дальше всех уходит в древность». И это правда: Аргыны помнят себя со времён великих тюркских каганатов.\n\nНо главная их сила — не армия. Это слово. Казыбек бий одной речью остановил войну. Абай одним стихом изменил мышление целого народа. Шоқан одним путешествием открыл Азию для всего мира.\n\n🌍 Сегодня Арғын — самый многочисленный казахский род. Их история — это история казахской интеллигенции, казахской дипломатии и казахского духа.`,
                tamga: `Тамға «Үшкіл» (△) — треугольник, символ триединства.\n\nТри вершины: небо, земля, человек. Или: мудрость, сила, красота. Треугольник — самая устойчивая фигура — символ незыблемости рода.`,
                famous: `Атақты адамдар:\n\n★ Казыбек бий (1667–1763)\nВеликий би, один из Трёх биев (Үш би). Его речь перед калмыками остановила войну. «Казыбек сөзі» — образец казахского красноречия.\n\n★ Абай Кунанбаев (1845–1904)\nПоэт, философ, просветитель. Отец современной казахской литературы. «Қара сөздер» — духовный завет нации.\n\n★ Шоқан Уәлиханов (1835–1865)\nПутешественник, учёный. Первый казах-исследователь мирового уровня. Составил карты Центральной Азии.`,
                traditions: `Дәстүрлер:\n\n• «Шежіре сақтау» — хранение родословной — священный долг каждого аргына.\n• «Жиын» — большой родовой съезд для решения важных вопросов.\n• Традиция акынства и айтысов — поэтические поединки в крови у аргынов.`,
                location: `Мекен:\n\nКарагандинская, Павлодарская, Северо-Казахстанская, Акмолинская области.`
            },
            nayman: {
                history: `Найман — потомки Найманского ханства (XII в.), одного из самых развитых государств домонгольской степи. Найманы имели государственность, письменность (уйгурское письмо) и развитую культуру задолго до Чингисхана.\n\nПосле монгольского завоевания сохранили аристократическое самосознание и традицию письменности — редкое явление среди кочевников.`,
                tamga: `Тамға «Бақан» (⩔) — шест для поднятия купола юрты.\n\nСимвол опоры — того, на ком держится весь кров. Найман был опорой казахской государственности так же, как бақан держит шанырак.`,
                famous: `Атақты адамдар:\n\n★ Кучлук (? – 1218)\nПоследний хан Найманов. После поражения от Чингисхана бежал на запад и правил государством Кара-Китай.\n\n★ Ақжол бий (XV–XVI вв.)\nВеликий судья Найманов, хранитель обычного права «Жеты Жаргы».\n\n★ Мәди Бапиұлы (1880–1935)\nНародный акын, хранитель эпической традиции.`,
                traditions: `Дәстүрлер:\n\n• «Хан тізе» — уважение к старейшинам как к ханам.\n• Традиция письменности: Найман первыми среди кочевников использовали уйгурское письмо.\n• «Той жарысы» — состязание акынов как обязательная часть любого торжества.`,
                location: `Мекен:\n\nВосточно-Казахстанская, Семейская, Абайская области. Исторически — Верхний Иртыш и Алтай.`
            },
            qonyrat: {
                history: `Қоңырат — дипломатический род казахской степи. Из него происходила Борте — главная жена Чингисхана. Матери ханов делали Конырат незаменимыми советниками.\n\nКоныраты были искусными переговорщиками: их дочерей брали в жёны правители, обеспечивая через них мир и союзы.`,
                tamga: `Тамға «Босаға» (⧖) — дверная рама юрты, порог.\n\nТот, кто стоит у порога, контролирует вход и выход. Конырат стоял у ворот власти — через их дочерей проходила ханская линия.`,
                famous: `Атақты адамдар:\n\n★ Борте-хатун (ок. 1161–1230)\nГлавная жена Чингисхана, мать его четырёх сыновей. Из рода Конырат. Оказала огромное влияние на политику Монгольской империи.\n\n★ Тама би (XVIII в.)\nВеликий би, один из создателей «Жеты Жаргы» при Тауке хане.`,
                traditions: `Дәстүрлер:\n\n• «Бесік той» — особый пышный обряд первой колыбели, символизирующий новое начало.\n• «Ұзату» — торжественные проводы невесты с богатым приданым.\n• Традиция дипломатии: Конырат всегда первыми предлагали мирные переговоры.`,
                location: `Мекен:\n\nКызылординская, Туркестанская области. Исторически — Приаралье и низовья Сырдарьи.`

            qypshaq: {

        // --- Tree Components ---

        function Node({ node, expanded, onToggle }) {
            const [vis, setVis] = useState(false);
            useEffect(() => {
                const delay = Math.min((node.gen - 1) * 60, 800);
                const t = setTimeout(() => setVis(true), delay);
                return () => clearTimeout(t);
            }, [node.gen]);

            const hasKids = node.children && node.children.length > 0;
            const isOpen  = expanded.has(node.id);
            const isSmall = node.gen >= 8;
            const isMain  = node.isMainLine;
            const isHL    = node.highlight;

            return (
                <div id={`node-${node.id}`}
                    style={{
                        opacity:    vis ? 1 : 0,
                        transform:  vis ? 'translateY(0) scale(1)' : 'translateY(-12px) scale(0.93)',
                        transition: 'opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1)',
                        position: 'relative',
                    }}
                >
                    <div
                        onClick={() => hasKids && onToggle(node.id)}
                        className={`flex flex-col items-center relative overflow-hidden group transition-all duration-300${isMain ? ' tree-node-main' : ''}`}
                        style={{
                            padding:      isSmall ? '9px 13px' : '13px 18px',
                            width:        isSmall ? 140 : 168,
                            minHeight:    node.gen <= 2 ? 82 : 58,
                            borderRadius: 14,
                            cursor:       hasKids ? 'pointer' : 'default',
                            background:   isHL ? 'rgba(197,165,90,0.13)' : isMain ? 'rgba(197,165,90,0.07)' : '#0D0D0D',
                            border:       isHL ? '1px solid rgba(197,165,90,0.6)' : isMain ? '1px solid rgba(197,165,90,0.3)' : '1px solid #1c1c1c',
                            boxSizing:    'border-box',
                        }}
                    >
                        {/* Top accent line for main/highlight */}
                        {(isMain || isHL) && (
                            <div className="absolute top-0 left-0 right-0" style={{height:2, background:'linear-gradient(to right,transparent,rgba(197,165,90,0.7),transparent)', borderRadius:'14px 14px 0 0'}} />
                        )}
                        <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none" style={{background:'radial-gradient(ellipse at 50% 0%,rgba(197,165,90,0.06),transparent 70%)'}} />

                        {/* Gen badge */}
                        <div className="absolute top-1.5 right-2 font-mono" style={{fontSize:8, color: isMain ? 'rgba(197,165,90,0.25)' : 'rgba(255,255,255,0.1)'}}>
                            {node.gen}
                        </div>

                        {/* Name */}
                        <div className="font-serif leading-tight text-center" style={{
                            fontSize:      node.gen <= 2 ? 17 : node.gen <= 5 ? 14 : 12,
                            color:         isHL ? 'rgba(197,165,90,1)' : isMain ? 'rgba(197,165,90,0.85)' : '#cccccc',
                            fontWeight:    isHL ? 600 : isMain ? 500 : 400,
                            letterSpacing: '0.01em',
                        }}>
                            {node.name}
                        </div>

                        {/* Era */}
                        {node.era && node.gen <= 6 && (
                            <div className="mt-1 text-center leading-tight" style={{fontSize:8, color:'#3a3a2e', letterSpacing:'0.04em'}}>
                                {node.era}
                            </div>
                        )}

                        {/* Label */}
                        {node.label && (
                            <div className="mt-1 font-serif italic" style={{fontSize:9, color:'#888', letterSpacing:'0.05em'}}>
                                {node.label}
                            </div>
                        )}

                        {/* Expand arrow */}
                        {hasKids && (
                            <div className="mt-1.5 transition-all duration-400" style={{
                                fontSize: 9,
                                color: isOpen ? 'rgba(197,165,90,0.3)' : '#555',
                                transform: isOpen ? 'rotate(180deg)' : 'none',
                            }}>▾</div>
                        )}
                    </div>
                </div>
            );
        }

        function TreeBranch({ node, expanded, onToggle }) {
            const isOpen  = expanded.has(node.id);
            const hasKids = node.children && node.children.length > 0;

            const sortedKids = node.children || [];
            const isSplit = hasKids && sortedKids.length > 1;

            const isMain = node.isMainLine;
            const strong = 'linear-gradient(to bottom,rgba(197,165,90,0.65),rgba(197,165,90,0.25))';
            const weak   = 'linear-gradient(to bottom,rgba(197,165,90,0.18),rgba(197,165,90,0.06))';

            return (
                <div className="flex flex-col items-center">
                    <Node node={node} expanded={expanded} onToggle={onToggle} />

                    {/* ── Single child (linear chain) ── */}
                    {hasKids && isOpen && !isSplit && (() => {
                        const child = sortedKids[0];
                        const childMain = child.isMainLine || child.highlight;
                        return (
                            <>
                                <div className={isMain && childMain ? 'tree-line-main' : ''}
                                    style={{height: 40, width: 1, background: childMain ? strong : weak, position:'relative'}}>
                                    <div className={isMain && childMain ? 'tree-dot-main' : ''} style={{
                                        position:'absolute', top:'50%', left:'50%',
                                        transform:'translate(-50%,-50%)',
                                        width:7, height:7, borderRadius:'50%',
                                        border: childMain ? '1px solid rgba(197,165,90,0.7)' : '1px solid rgba(197,165,90,0.15)',
                                        background:'#0d0d0d',
                                        boxShadow: childMain ? '0 0 6px rgba(197,165,90,0.35)' : 'none',
                                    }} />
                                </div>
                                <TreeBranch node={child} expanded={expanded} onToggle={onToggle} />
                            </>
                        );
                    })()}

                    {/* ── Multiple children (split branch) ── */}
                    {hasKids && isOpen && isSplit && (
                        <>
                            {/* Vertical stem */}
                            <div style={{height: 24, width: 1, background: isMain ? strong : weak}} />

                            {/* Children row */}
                            <div style={{display: 'flex', alignItems: 'flex-start', justifyContent: 'center', gap: 12}}>
                                {sortedKids.map((ch, i) => {
                                    const isFirst = i === 0;
                                    const isLast  = i === sortedKids.length - 1;
                                    const armColor = 'rgba(197,165,90,0.25)';
                                    return (
                                        <div key={ch.id}
                                            style={{
                                                display: 'flex', flexDirection: 'column', alignItems: 'center',
                                                opacity: 0,
                                                animation: `nodeReveal 0.4s ease ${i * 80}ms forwards`,
                                            }}>
                                            {/* T-connector */}
                                            <div style={{position: 'relative', height: 24, width: '100%', minWidth: 4}}>
                                                {!isFirst && (
                                                    <div style={{
                                                        position: 'absolute', top: 0, right: '50%',
                                                        width: 'calc(50% + 6px)', height: 1,
                                                        background: armColor,
                                                    }} />
                                                )}
                                                {!isLast && (
                                                    <div style={{
                                                        position: 'absolute', top: 0, left: '50%',
                                                        width: 'calc(50% + 6px)', height: 1,
                                                        background: armColor,
                                                    }} />
                                                )}
                                                <div style={{
                                                    position: 'absolute', top: 0, bottom: 0,
                                                    left: '50%', transform: 'translateX(-50%)',
                                                    width: 1,
                                                    background: (ch.isMainLine || ch.highlight) ? strong : weak,
                                                }} />
                                            </div>
                                            <TreeBranch node={ch} expanded={expanded} onToggle={onToggle} />
                                        </div>
                                    );
                                })}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function ShezhireTreeSection({ onBack }) {
            const getMainIds = (node) => {
                let ids = [];
                if (node.isMainLine || node.highlight) ids.push(node.id);
                (node.children || []).forEach(ch => { ids = ids.concat(getMainIds(ch)); });
                return ids;
            };
            const getAllIds = (node) => {
                let ids = [node.id];
                (node.children || []).forEach(ch => { ids = ids.concat(getAllIds(ch)); });
                return ids;
            };

            const [expanded, setExpanded] = useState(() => new Set(['alash']));
            const [zoom, setZoom] = useState(0.8);
            const [wheelMode, setWheelMode] = useState('scroll'); // 'scroll' | 'zoom'
            const wheelModeRef = useRef('scroll');
            const treeContainerRef = useRef(null);

            const toggleWheelMode = () => {
                const next = wheelModeRef.current === 'scroll' ? 'zoom' : 'scroll';
                wheelModeRef.current = next;
                setWheelMode(next);
            };

            useEffect(() => {
                const el = treeContainerRef.current;
                if (!el) return;
                const handler = (e) => {
                    if (wheelModeRef.current !== 'zoom') return; // pass-through for scroll
                    e.preventDefault();
                    setZoom(z => {
                        const factor = e.deltaY < 0 ? 1.03 : 0.97; // gentle 3% step
                        return Math.min(2.5, Math.max(0.1, z * factor));
                    });
                };
                el.addEventListener('wheel', handler, { passive: false });
                return () => el.removeEventListener('wheel', handler);
            }, []);

            const toggle = (id) => {
                setExpanded(prev => {
                    const next = new Set(prev);
                    next.has(id) ? next.delete(id) : next.add(id);
                    return next;
                });
            };

            const expandAll   = () => setExpanded(new Set(getAllIds(TREE_DATA)));
            const collapseAll = () => setExpanded(new Set(['alash']));

            const focusMe = () => {
                const el = document.getElementById('node-damir');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            };

            return (
                <div className="px-4 md:px-6 py-12 md:py-20 min-h-screen" style={{maxWidth: '100vw', overflowX: 'hidden'}}>

                    {/* Controls bar */}
                    <div className="flex justify-between items-center mb-6 flex-wrap gap-3 max-w-7xl mx-auto">
                        <button onClick={onBack}
                            className="text-[#666] hover:text-[#C5A55A] transition-colors flex items-center gap-2 text-[10px] tracking-widest leading-none">

                        </button>
                        <div className="flex gap-2 flex-wrap justify-end items-center">
                            {/* Scroll / Zoom mode toggle */}
                            <button
                                onClick={toggleWheelMode}
                                className="px-3 py-1.5 rounded-full text-[9px] tracking-widest uppercase transition-all duration-200 flex items-center gap-1.5"
                                style={{
                                    border: wheelMode === 'zoom'
                                        ? '1px solid rgba(197,165,90,0.6)'
                                        : '1px solid #2a2a2a',
                                    color:      wheelMode === 'zoom' ? '#C5A55A' : '#555',
                                    background: wheelMode === 'zoom' ? 'rgba(197,165,90,0.08)' : 'transparent',
                                }}>
                                <span style={{fontSize: 10}}>{wheelMode === 'zoom' ? '🔍' : '↕'}</span>
                                {wheelMode === 'zoom' ? 'Колесо = зум' : 'Колесо = скролл'}
                            </button>

                            {/* Zoom controls */}
                            <div className="flex items-center gap-1 border border-[#1c1c1c] rounded-full px-1 py-0.5">
                                <button onClick={() => setZoom(z => Math.max(0.1, z - 0.1))}
                                    className="w-6 h-6 flex items-center justify-center text-[#666] hover:text-[#C5A55A] transition-colors text-base leading-none">−</button>
                                <span className="text-[9px] text-[#444] w-9 text-center tracking-wide"
                                    style={{fontVariantNumeric: 'tabular-nums'}}>
                                    {Math.round(zoom * 100)}%
                                </span>
                                <button onClick={() => setZoom(z => Math.min(2.5, z + 0.1))}
                                    className="w-6 h-6 flex items-center justify-center text-[#666] hover:text-[#C5A55A] transition-colors text-base leading-none">+</button>
                                <button onClick={() => setZoom(0.8)}
                                    className="text-[8px] text-[#444] hover:text-[#888] px-1.5 transition-colors tracking-wide uppercase">↺</button>
                            </div>
                            <button onClick={expandAll}
                                className="px-3 py-1.5 border border-[#C5A55A30] text-[#C5A55A] rounded-full text-[9px] tracking-widest uppercase hover:bg-[#C5A55A0A] transition-colors">
                                Барлығын ашу
                            </button>
                            <button onClick={collapseAll}
                                className="px-3 py-1.5 border border-[#1c1c1c] text-[#444] rounded-full text-[9px] tracking-widest uppercase hover:text-[#777] transition-colors">
                                Тек ата жолы
                            </button>
                            <button onClick={focusMe}
                                className="px-3 py-1.5 rounded-full text-[9px] tracking-widest uppercase transition-colors"
                                style={{border: '1px solid rgba(197,165,90,0.5)', color: '#C5A55A', background: 'rgba(197,165,90,0.06)'}}>
                                Мені табу →
                            </button>
                        </div>
                    </div>

                    {/* Header */}
                    <header className="text-center mb-8 px-4 max-w-7xl mx-auto">
                        <div className="inline-block px-4 py-1 border border-[#C5A55A25] rounded-full text-[9px] tracking-[0.3em] text-[#C5A55A60] uppercase mb-4">
                            Әлімұлы · Кіші жүз · Қарамашақ-Төртқара
                        </div>
                        <h2 className="text-3xl md:text-5xl font-serif mb-3 tracking-widest text-[#C5A55A] leading-tight">ШЕЖІРЕ ДРЕВО</h2>

                    return { text: k.traditions, sugg: SUGGESTIONS.traditions };

                    return { text: k.location, sugg: SUGGESTIONS.location };
                return { text: `${t.tamga}  ${t.name}\n${t.juz}\n\n${t.story}`, sugg: SUGGESTIONS.general };

                        {/* Tumalas Grid style */}
                        <div className="space-y-16">
                            <ZhuzSection title={ZHUZES.ULY} list={Object.entries(TRIBES_DB).filter(([_, t]) => t.juz === ZHUZES.ULY)} onSelect={onTribeSelect} />
                            <ZhuzSection title={ZHUZES.ORTA} list={Object.entries(TRIBES_DB).filter(([_, t]) => t.juz === ZHUZES.ORTA)} onSelect={onTribeSelect} />
                            <ZhuzSection title={ZHUZES.KISHI} list={Object.entries(TRIBES_DB).filter(([_, t]) => t.juz === ZHUZES.KISHI)} onSelect={onTribeSelect} />
                        </div>
                    </section>
                </div>
            );
        }

        function ZhuzSection({ title, list, onSelect }) {
            return (
                <div className="group">
                    <h3 className="text-[#C5A55A] text-[10px] md:text-xs font-semibold tracking-[0.3em] md:tracking-[0.5em] uppercase mb-6 md:mb-8 flex items-center gap-4">
                        {title}
                        <div className="h-[1px] flex-1 bg-gradient-to-r from-[#C5A55A40] to-transparent" />
                    </h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4">
                        {list.map(([key, t]) => (
                            <button
                                key={key}
                                onClick={() => onSelect(key)}
                                className="glass-card rounded-2xl p-6 flex flex-col items-center group/card relative overflow-hidden"
                            >
                                <div className="text-3xl text-[#C5A55A] mb-4 tamga-glow group-hover/card:scale-125 transition-transform duration-500">
                                    {t.tamga}
                                </div>
                                <span className="text-xs font-bold tracking-[0.2em] text-white">
                                    {t.name}
                                </span>
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#C5A55A0A] opacity-0 group-hover/card:opacity-100 transition-opacity"></div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // --- Interactive Flow Screens ---

        function InteractiveFlow({ tribeKey, onBack, onTreeFinish }) {
            const [step, setStep] = useState(0); // 0:Story, 1:JetiAta, 2:Mint, 3:Result
            const [userData, setUserData] = useState({ name: "", ancestors: Array(7).fill("") });

            const tribe = TRIBES_DB[tribeKey];

            return (
                <div className="max-w-4xl mx-auto px-6 py-24 min-h-screen content-center">
                    <button onClick={onBack} className="text-[#666] hover:text-[#C5A55A] transition-colors mb-12 flex items-center gap-2 text-xs tracking-widest">
                        ← НАЗАД К СЕТКЕ
                    </button>

                    {step === 0 && <StoryScreen tribe={tribe} onNext={() => setStep(1)} />}
                    {step === 1 && <JetiAtaScreen tribe={tribe} data={userData} onChange={setUserData} onNext={() => setStep(2)} />}
                    {step === 2 && <MintScreen tribe={tribe} data={userData} onNext={() => setStep(3)} />}
                    {step === 3 && <ResultScreen tribe={tribe} data={userData} onRestart={onBack} onShowTree={onTreeFinish} />}
                </div>
            );
        }

        function StoryScreen({ tribe, onNext }) {
            const [tab, setTab] = useState('history');

            return (
                <div className="animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="flex flex-col items-center text-center mb-12">
                        <div className="w-24 h-24 rounded-full border border-[#C5A55A40] flex items-center justify-center text-5xl text-[#C5A55A] tamga-glow mb-6">
                            {tribe.tamga}
                        </div>
                        <h1 className="text-5xl font-serif tracking-widest mb-2">{tribe.name}</h1>
                        <p className="text-[#C5A55A] text-[10px] tracking-[0.5em] uppercase font-bold">{tribe.juz}</p>
                    </div>

                    <div className="glass-card rounded-3xl p-8 mb-12">
                        <p className="text-[#999] text-[10px] tracking-widest uppercase mb-4">Хроники племени</p>
                        <p className="text-xl md:text-2xl font-serif leading-relaxed text-[#eee]">
                            {tribe.story}
                        </p>
                    </div>

                    <button onClick={onNext} className="w-full gold-pill py-5 rounded-2xl font-bold tracking-[0.3em] uppercase transition hover:scale-[1.02] shadow-xl">
                        К верификации Жеті Ата →
                    </button>
                </div>
            );
        }

        function JetiAtaScreen({ tribe, data, onChange, onNext }) {
            const labels = ["Өзің (Ты)", "Әке (Отец)", "Ата (Дед)", "Арғы ата (Прадед)", "Баба (4-е колено)", "Түп ата (5-е колено)", "Тек ата (6-е колено)"];
            const [error, setError] = useState("");

            const validate = () => {
                if (!data.name.trim()) { setError("Пожалуйста, введите свое имя"); return; }
                const filled = data.ancestors.filter(a => a.trim()).length;
                if (filled < 3) { setError("Назовите хотя бы 3 предков для продолжения"); return; }
                onNext();
            };

            return (
                <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                    <h2 className="text-3xl font-serif text-center mb-12">Протокол верификации Наследия</h2>

                    <div className="max-w-md mx-auto space-y-8">
                        <div>
                            <label className="text-[10px] tracking-[0.2em] text-[#C5A55A] block mb-2">ВАШЕ ИМЯ</label>
                            <input
                                value={data.name}
                                onChange={e => onChange({ ...data, name: e.target.value })}
                                className="w-full bg-[#0d0d0d] border border-[#222] rounded-xl px-4 py-3 outline-none focus:border-[#C5A55A80] transition"
                                placeholder="Введите имя..."
                            />
                        </div>

                        <div className="space-y-4 relative">
                            <div className="absolute left-4 top-4 bottom-4 w-[1px] bg-[#222]" />
                            {labels.map((l, i) => (
                                <div key={i} className="flex gap-4 items-center">
                                    <div className={`w-8 h-8 rounded-full flex-shrink-0 z-10 text-[10px] font-bold flex items-center justify-center border transition-colors ${data.ancestors[i] ? 'gold-pill border-[#C5A55A]' : 'bg-black border-[#222] text-[#444]'}`}>
                                        {i + 1}
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-[9px] text-[#555] block uppercase mb-1">{l}</label>
                                        <input
                                            value={data.ancestors[i]}
                                            onChange={e => {
                                                const newA = [...data.ancestors]; newA[i] = e.target.value;
                                                onChange({ ...data, ancestors: newA });
                                            }}
                                            className="w-full bg-transparent border-b border-[#222] py-2 text-sm focus:border-[#C5A55A] outline-none transition"
                                            placeholder={`Имя ${i + 1}-го предка`}
                                        />
                                    </div>
                                </div>
                            ))}
                        </div>

                        {error && <p className="text-red-500 text-xs text-center">{error}</p>}

                        <button onClick={validate} className="w-full gold-pill py-5 rounded-2xl font-bold tracking-[0.3em] uppercase transition hover:scale-[1.02]">
                            ПРОВЕРИТЬ КОД РОДА
                        </button>
                    </div>
                </div>
            );
        }

        function MintScreen({ tribe, data, onNext }) {
            const [progress, setProgress] = useState(0);
            const [status, setStatus] = useState("Инициализация...");

            useEffect(() => {
                const interval = setInterval(() => {
                    setProgress(p => {
                        if (p >= 100) { clearInterval(interval); setTimeout(onNext, 1000); return 100; }
                        if (p < 30) setStatus("Запись в IPFS...");
                        else if (p < 60) setStatus("Генерация смарт-контракта...");
                        else if (p < 90) setStatus("Верификация на Polygon...");
                        else setStatus("Минтинг завершен!");
                        return p + Math.random() * 10;
                    });
                }, 400);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="text-center py-24">
                    <div className="w-48 h-48 mx-auto mb-12 relative">
                        <div className="absolute inset-0 border-4 border-[#C5A55A20] rounded-full"></div>
                        <div className="absolute inset-0 border-t-4 border-[#C5A55A] rounded-full animate-spin"></div>
                        <div className="absolute inset-0 flex items-center justify-center text-4xl text-[#C5A55A] tamga-glow">
                            {tribe.tamga}
                        </div>
                    </div>
                    <h2 className="text-3xl font-serif mb-4">Чеканка SBT Токена</h2>
                    <p className="text-[#666] mb-12 tracking-widest uppercase text-xs">{status}</p>

                    <div className="max-w-xs mx-auto h-1 bg-[#1a1a1a] rounded-full overflow-hidden">
                        <div className="h-full bg-[#C5A55A] shadow-[0_0_10px_rgba(197,165,90,0.8)] transition-all" style={{ width: `${progress}%` }}></div>
                    </div>
                </div>
            );
        }

        function ResultScreen({ tribe, data, onRestart, onShowTree }) {
            const txHash = `0x${Array.from({ length: 32 }, () => Math.floor(Math.random() * 16).toString(16)).join('')}`;

            return (
                <div className="animate-in zoom-in-95 duration-700">
                    <div className="glass-card rounded-[2.5rem] p-1 scale-105 rotate-1 mb-16 relative">
                        <div className="bg-[#000] rounded-[2.4rem] p-8 text-center overflow-hidden">
                            {/* Decorative Gold Header */}
                            <div className="absolute top-0 inset-x-0 h-32 bg-gradient-to-b from-[#C5A55A1A] to-transparent"></div>

                            <div className="relative z-10 pt-8">
                                <div className="text-7xl text-[#C5A55A] tamga-glow font-serif mb-6">{tribe.tamga}</div>
                                <h1 className="text-4xl font-serif tracking-tight mb-2 uppercase">{tribe.name}</h1>
                                <p className="text-[#C5A55A] text-[10px] tracking-[0.5em] mb-8 uppercase font-bold">{tribe.juz}</p>

                                <div className="border-t border-b border-[#1a1a1a] py-6 mb-8 text-left space-y-3">
                                    <div className="flex justify-between">
                                        <span className="text-[10px] text-[#444] uppercase tracking-widest">Владелец</span>
                                        <span className="text-sm font-semibold">{data.name}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-[10px] text-[#444] uppercase tracking-widest">Глубина</span>
                                        <span className="text-sm font-semibold">{data.ancestors.filter(a => a.trim()).length}/7 Ата</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-[10px] text-[#444] uppercase tracking-widest">Тип токена</span>
                                        <span className="text-sm font-semibold text-[#4ade80]">Soulbound (SBT)</span>
                                    </div>
                                </div>

                                <div className="bg-[#0a0a0a] rounded-xl p-4 mb-4 text-left border border-[#1a1a1a]">
                                    <span className="text-[10px] text-[#444] uppercase block mb-1">Transaction Hash</span>
                                    <code className="text-[10px] text-[#555] break-all">{txHash}</code>
                                </div>
                                <p className="text-[10px] text-[#444] tracking-widest uppercase mb-6">Verified by Shejire AI Consensus v2.0</p>

                                <button onClick={onShowTree} className="w-full bg-[#4ade8020] border border-[#4ade8040] text-[#4ade80] py-4 rounded-xl font-bold tracking-[0.2em] uppercase transition hover:bg-[#4ade8030] mb-4">
                                    Посмотреть мое древо
                                </button>
                            </div>
                        </div>
                    </div>

                    <button onClick={onRestart} className="w-full border border-[#222] hover:border-[#C5A55A40] text-[#666] hover:text-[#C5A55A] py-5 rounded-2xl font-bold tracking-[0.3em] uppercase transition">
                        ВЕРНУТЬСЯ В СТЕПЬ
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
