    <style>
        :root {
            --bg-void: #080808;
            --bg-surface: #0D0D0D;
            --gold-primary: #C5A55A;
            --gold-deep: #8B6914;
            --gold-glow: rgba(197, 165, 90, 0.15);
            --node-w: 180px;
            --node-w-deep: 140px;
        }

        @media (max-width: 768px) {
            :root {
                --node-w: 140px;
                --node-w-deep: 110px;
            }
        }

        body {
            background-color: var(--bg-void);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .gold-pill {
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-deep) 100%);
            color: black;
        }

        .glass-card {
            background: var(--bg-surface);
            border: 1px solid #1a1a1a;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(197, 165, 90, 0.4);
            box-shadow: 0 0 30px var(--gold-glow);
            transform: translateY(-4px);
        }

        .tamga-glow {
            text-shadow: 0 0 15px rgba(197, 165, 90, 0.6);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }

            50% {
                transform: translateY(-40px) translateX(20px);
                opacity: 0.8;
            }
        }

        @keyframes tokenFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes tokenGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(74, 222, 128, 0.6)) drop-shadow(0 0 60px rgba(197, 165, 90, 0.3));
            }
        }

        .animate-float {
            animation: float 10s ease-in-out infinite;
        }

        .token-card {
            animation: tokenFloat 3s ease-in-out infinite, tokenGlow 4s ease-in-out infinite;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #080808;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-primary);
        }

        /* ── Tree animations ── */
        @keyframes pulseGold {
            0%, 100% { box-shadow: 0 0 16px rgba(197,165,90,0.18), 0 4px 20px rgba(0,0,0,0.5); }
            50%       { box-shadow: 0 0 36px rgba(197,165,90,0.48), 0 0 60px rgba(197,165,90,0.14), 0 4px 20px rgba(0,0,0,0.5); }
        }
        @keyframes lineGlow {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 0.9; }
        }
        @keyframes nodeReveal {
            from { opacity: 0; transform: translateY(-14px) scale(0.93); }
            to   { opacity: 1; transform: translateY(0)     scale(1); }
        }
        @keyframes dotPulse {
            0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.7; }
            50%       { transform: translate(-50%,-50%) scale(1.6); opacity: 1; }
        }
        .tree-node-main  { animation: pulseGold 3.2s ease-in-out infinite; }
        .tree-line-main  { animation: lineGlow  2.5s ease-in-out infinite; }
        .tree-dot-main   { animation: dotPulse  2s   ease-in-out infinite; }
    </style>
</head>

        // --- Layout Components ---

        function Background() {
            return (
                <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">

                    ))}
                    <div className="absolute inset-0 opacity-20"
                        style={{ backgroundImage: 'radial-gradient(circle at 50% 50%, #1a1a1a 0%, transparent 70%)' }}></div>
                </div>
            );
        }

        function OrnamentLine() {
            return (
                <div className="flex items-center justify-center gap-4 my-8">
                    <div className="w-16 h-[1px] bg-gradient-to-r from-transparent to-[#C5A55A]" />
                    <div className="w-2 h-2 border border-[#C5A55A] rotate-45" />
                    <div className="w-16 h-[1px] bg-gradient-to-l from-transparent to-[#C5A55A]" />
                </div>
            );
        }

        // --- Tree Components ---

        function Node({ node, expanded, onToggle }) {
            const [vis, setVis] = useState(false);
            useEffect(() => {
                const delay = Math.min((node.gen - 1) * 60, 800);
                const t = setTimeout(() => setVis(true), delay);
                return () => clearTimeout(t);
            }, [node.gen]);

            const hasKids = node.children && node.children.length > 0;
            const isOpen  = expanded.has(node.id);
            const isSmall = node.gen >= 8;
            const isMain  = node.isMainLine;
            const isHL    = node.highlight;

            return (
                <div id={`node-${node.id}`}
                    style={{
                        opacity:    vis ? 1 : 0,
                        transform:  vis ? 'translateY(0) scale(1)' : 'translateY(-12px) scale(0.93)',
                        transition: 'opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1)',
                        position: 'relative',
                    }}
                >
                    <div
                        onClick={() => hasKids && onToggle(node.id)}
                        className={`flex flex-col items-center relative overflow-hidden group transition-all duration-300${isMain ? ' tree-node-main' : ''}`}
                        style={{
                            padding:      isSmall ? '9px 13px' : '13px 18px',
                            width:        isSmall ? 140 : 168,
                            minHeight:    node.gen <= 2 ? 82 : 58,
                            borderRadius: 14,
                            cursor:       hasKids ? 'pointer' : 'default',
                            background:   isHL ? 'rgba(197,165,90,0.13)' : isMain ? 'rgba(197,165,90,0.07)' : '#0D0D0D',
                            border:       isHL ? '1px solid rgba(197,165,90,0.6)' : isMain ? '1px solid rgba(197,165,90,0.3)' : '1px solid #1c1c1c',
                            boxSizing:    'border-box',
                        }}
                    >
                        {/* Top accent line for main/highlight */}
                        {(isMain || isHL) && (
                            <div className="absolute top-0 left-0 right-0" style={{height:2, background:'linear-gradient(to right,transparent,rgba(197,165,90,0.7),transparent)', borderRadius:'14px 14px 0 0'}} />
                        )}
                        <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none" style={{background:'radial-gradient(ellipse at 50% 0%,rgba(197,165,90,0.06),transparent 70%)'}} />

                        {/* Gen badge */}
                        <div className="absolute top-1.5 right-2 font-mono" style={{fontSize:8, color: isMain ? 'rgba(197,165,90,0.25)' : 'rgba(255,255,255,0.1)'}}>
                            {node.gen}
                        </div>

                        {/* Name */}
                        <div className="font-serif leading-tight text-center" style={{
                            fontSize:      node.gen <= 2 ? 17 : node.gen <= 5 ? 14 : 12,
                            color:         isHL ? 'rgba(197,165,90,1)' : isMain ? 'rgba(197,165,90,0.85)' : '#cccccc',
                            fontWeight:    isHL ? 600 : isMain ? 500 : 400,
                            letterSpacing: '0.01em',
                        }}>
                            {node.name}
                        </div>

                        {/* Era */}
                        {node.era && node.gen <= 6 && (
                            <div className="mt-1 text-center leading-tight" style={{fontSize:8, color:'#3a3a2e', letterSpacing:'0.04em'}}>
                                {node.era}
                            </div>
                        )}

                        {/* Label */}
                        {node.label && (
                            <div className="mt-1 font-serif italic" style={{fontSize:9, color:'#888', letterSpacing:'0.05em'}}>
                                {node.label}
                            </div>
                        )}

                        {/* Expand arrow */}
                        {hasKids && (
                            <div className="mt-1.5 transition-all duration-400" style={{
                                fontSize: 9,
                                color: isOpen ? 'rgba(197,165,90,0.3)' : '#555',
                                transform: isOpen ? 'rotate(180deg)' : 'none',
                            }}>▾</div>
                        )}
                    </div>
                </div>
            );
        }

        function TreeBranch({ node, expanded, onToggle }) {
            const isOpen  = expanded.has(node.id);
            const hasKids = node.children && node.children.length > 0;

            const sortedKids = node.children || [];
            const isSplit = hasKids && sortedKids.length > 1;

            const isMain = node.isMainLine;
            const strong = 'linear-gradient(to bottom,rgba(197,165,90,0.65),rgba(197,165,90,0.25))';
            const weak   = 'linear-gradient(to bottom,rgba(197,165,90,0.18),rgba(197,165,90,0.06))';

            return (
                <div className="flex flex-col items-center">
                    <Node node={node} expanded={expanded} onToggle={onToggle} />

                    {/* ── Single child (linear chain) ── */}
                    {hasKids && isOpen && !isSplit && (() => {
                        const child = sortedKids[0];
                        const childMain = child.isMainLine || child.highlight;
                        return (
                            <>
                                <div className={isMain && childMain ? 'tree-line-main' : ''}
                                    style={{height: 40, width: 1, background: childMain ? strong : weak, position:'relative'}}>
                                    <div className={isMain && childMain ? 'tree-dot-main' : ''} style={{
                                        position:'absolute', top:'50%', left:'50%',
                                        transform:'translate(-50%,-50%)',
                                        width:7, height:7, borderRadius:'50%',
                                        border: childMain ? '1px solid rgba(197,165,90,0.7)' : '1px solid rgba(197,165,90,0.15)',
                                        background:'#0d0d0d',
                                        boxShadow: childMain ? '0 0 6px rgba(197,165,90,0.35)' : 'none',
                                    }} />
                                </div>
                                <TreeBranch node={child} expanded={expanded} onToggle={onToggle} />
                            </>
                        );
                    })()}

                    {/* ── Multiple children (split branch) ── */}
                    {hasKids && isOpen && isSplit && (
                        <>
                            {/* Vertical stem */}
                            <div style={{height: 24, width: 1, background: isMain ? strong : weak}} />

                            {/* Children row */}
                            <div style={{display: 'flex', alignItems: 'flex-start', justifyContent: 'center', gap: 12}}>
                                {sortedKids.map((ch, i) => {
                                    const isFirst = i === 0;
                                    const isLast  = i === sortedKids.length - 1;
                                    const armColor = 'rgba(197,165,90,0.25)';
                                    return (
                                        <div key={ch.id}
                                            style={{
                                                display: 'flex', flexDirection: 'column', alignItems: 'center',
                                                opacity: 0,
                                                animation: `nodeReveal 0.4s ease ${i * 80}ms forwards`,
                                            }}>
                                            {/* T-connector */}
                                            <div style={{position: 'relative', height: 24, width: '100%', minWidth: 4}}>
                                                {!isFirst && (
                                                    <div style={{
                                                        position: 'absolute', top: 0, right: '50%',
                                                        width: 'calc(50% + 6px)', height: 1,
                                                        background: armColor,
                                                    }} />
                                                )}
                                                {!isLast && (
                                                    <div style={{
                                                        position: 'absolute', top: 0, left: '50%',
                                                        width: 'calc(50% + 6px)', height: 1,
                                                        background: armColor,
                                                    }} />
                                                )}
                                                <div style={{
                                                    position: 'absolute', top: 0, bottom: 0,
                                                    left: '50%', transform: 'translateX(-50%)',
                                                    width: 1,
                                                    background: (ch.isMainLine || ch.highlight) ? strong : weak,
                                                }} />
                                            </div>
                                            <TreeBranch node={ch} expanded={expanded} onToggle={onToggle} />
                                        </div>
                                    );
                                })}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function ShezhireTreeSection({ onBack }) {
            const getMainIds = (node) => {
                let ids = [];
                if (node.isMainLine || node.highlight) ids.push(node.id);
                (node.children || []).forEach(ch => { ids = ids.concat(getMainIds(ch)); });
                return ids;
            };
            const getAllIds = (node) => {
                let ids = [node.id];
                (node.children || []).forEach(ch => { ids = ids.concat(getAllIds(ch)); });
                return ids;
            };

            const [expanded, setExpanded] = useState(() => new Set(['alash']));
            const [zoom, setZoom] = useState(0.8);
            const [wheelMode, setWheelMode] = useState('scroll'); // 'scroll' | 'zoom'
            const wheelModeRef = useRef('scroll');
            const treeContainerRef = useRef(null);

            const toggleWheelMode = () => {
                const next = wheelModeRef.current === 'scroll' ? 'zoom' : 'scroll';
                wheelModeRef.current = next;
                setWheelMode(next);
            };

            useEffect(() => {
                const el = treeContainerRef.current;
                if (!el) return;
                const handler = (e) => {
                    if (wheelModeRef.current !== 'zoom') return; // pass-through for scroll
                    e.preventDefault();
                    setZoom(z => {
                        const factor = e.deltaY < 0 ? 1.03 : 0.97; // gentle 3% step
                        return Math.min(2.5, Math.max(0.1, z * factor));
                    });
                };
                el.addEventListener('wheel', handler, { passive: false });
                return () => el.removeEventListener('wheel', handler);
            }, []);

            const toggle = (id) => {
                setExpanded(prev => {
                    const next = new Set(prev);
                    next.has(id) ? next.delete(id) : next.add(id);
                    return next;
                });
            };

            const expandAll   = () => setExpanded(new Set(getAllIds(TREE_DATA)));
            const collapseAll = () => setExpanded(new Set(['alash']));

            const focusMe = () => {
                const el = document.getElementById('node-damir');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            };

            return (
                <div className="px-4 md:px-6 py-12 md:py-20 min-h-screen" style={{maxWidth: '100vw', overflowX: 'hidden'}}>

                    {/* Controls bar */}
                    <div className="flex justify-between items-center mb-6 flex-wrap gap-3 max-w-7xl mx-auto">
                        <button onClick={onBack}
                            className="text-[#666] hover:text-[#C5A55A] transition-colors flex items-center gap-2 text-[10px] tracking-widest leading-none">
                            ← <span className="hidden md:inline">НАЗАД К СЕТКЕ</span><span className="md:hidden">НАЗАД</span>
                        </button>
                        <div className="flex gap-2 flex-wrap justify-end items-center">
                            {/* Scroll / Zoom mode toggle */}
                            <button
                                onClick={toggleWheelMode}
                                className="px-3 py-1.5 rounded-full text-[9px] tracking-widest uppercase transition-all duration-200 flex items-center gap-1.5"
                                style={{
                                    border: wheelMode === 'zoom'
                                        ? '1px solid rgba(197,165,90,0.6)'
                                        : '1px solid #2a2a2a',
                                    color:      wheelMode === 'zoom' ? '#C5A55A' : '#555',
                                    background: wheelMode === 'zoom' ? 'rgba(197,165,90,0.08)' : 'transparent',
                                }}>
                                <span style={{fontSize: 10}}>{wheelMode === 'zoom' ? '🔍' : '↕'}</span>
                                {wheelMode === 'zoom' ? 'Колесо = зум' : 'Колесо = скролл'}
                            </button>

                            {/* Zoom controls */}
                            <div className="flex items-center gap-1 border border-[#1c1c1c] rounded-full px-1 py-0.5">
                                <button onClick={() => setZoom(z => Math.max(0.1, z - 0.1))}
                                    className="w-6 h-6 flex items-center justify-center text-[#666] hover:text-[#C5A55A] transition-colors text-base leading-none">−</button>
                                <span className="text-[9px] text-[#444] w-9 text-center tracking-wide"
                                    style={{fontVariantNumeric: 'tabular-nums'}}>
                                    {Math.round(zoom * 100)}%
                                </span>
                                <button onClick={() => setZoom(z => Math.min(2.5, z + 0.1))}
                                    className="w-6 h-6 flex items-center justify-center text-[#666] hover:text-[#C5A55A] transition-colors text-base leading-none">+</button>
                                <button onClick={() => setZoom(0.8)}
                                    className="text-[8px] text-[#444] hover:text-[#888] px-1.5 transition-colors tracking-wide uppercase">↺</button>
                            </div>
                            <button onClick={expandAll}
                                className="px-3 py-1.5 border border-[#C5A55A30] text-[#C5A55A] rounded-full text-[9px] tracking-widest uppercase hover:bg-[#C5A55A0A] transition-colors">
                                Барлығын ашу
                            </button>
                            <button onClick={collapseAll}
                                className="px-3 py-1.5 border border-[#1c1c1c] text-[#444] rounded-full text-[9px] tracking-widest uppercase hover:text-[#777] transition-colors">
                                Тек ата жолы
                            </button>
                            <button onClick={focusMe}
                                className="px-3 py-1.5 rounded-full text-[9px] tracking-widest uppercase transition-colors"
                                style={{border: '1px solid rgba(197,165,90,0.5)', color: '#C5A55A', background: 'rgba(197,165,90,0.06)'}}>
                                Мені табу →
                            </button>
                        </div>
                    </div>

                    {/* Header */}
                    <header className="text-center mb-8 px-4 max-w-7xl mx-auto">
                        <div className="inline-block px-4 py-1 border border-[#C5A55A25] rounded-full text-[9px] tracking-[0.3em] text-[#C5A55A60] uppercase mb-4">
                            Әлімұлы · Кіші жүз · Қарамашақ-Төртқара
                        </div>
                        <h2 className="text-3xl md:text-5xl font-serif mb-3 tracking-widest text-[#C5A55A] leading-tight">ШЕЖІРЕ ДРЕВО</h2>
                        <p className="text-[#444] tracking-[0.35em] uppercase text-[8px] md:text-[9px] mb-5">21 ҰРПАҚ · АЛАШТАН ДАМИРГЕ ДЕЙІН</p>
                        <div className="flex justify-center items-center gap-4">
                            <div className="w-10 h-[1px] bg-gradient-to-r from-transparent to-[#C5A55A30]" />
                            <span className="text-xl text-[#C5A55A] tamga-glow" style={{fontFamily:"'Cinzel',serif"}}>⩔</span>
                            <div className="w-10 h-[1px] bg-gradient-to-l from-transparent to-[#C5A55A30]" />
                        </div>
                    </header>

                    {/* Legend */}
                    <div className="flex flex-wrap gap-4 justify-center mb-6 text-[9px] tracking-widest uppercase max-w-7xl mx-auto">
                        {[
                            { color: 'rgba(197,165,90,0.45)', bg: 'rgba(197,165,90,0.05)', label: 'Ата-бабалар жолы' },
                            { color: 'rgba(197,165,90,0.6)',  bg: 'rgba(197,165,90,0.08)', label: 'Туған туыс' },
                            { color: '#1c1c1c',               bg: 'transparent',           label: 'Басқа тармақ' },
                        ].map(l => (
                            <div key={l.label} className="flex items-center gap-2 text-[#555]">
                                <div style={{width: 10, height: 10, borderRadius: 3, border: `1px solid ${l.color}`, background: l.bg}} />
                                {l.label}

        function SubmitShejireModal({ onClose }) {
            const [contact, setContact] = useState('');
            const [nameInput, setNameInput] = useState('');
            const [chain, setChain] = useState([]);
            const [note, setNote] = useState('');
            const [submitted, setSubmitted] = useState(false);
            const [error, setError] = useState('');
            const inputRef = React.useRef(null);

            const addName = () => {
                const v = nameInput.trim();
                if (!v) return;
                setChain(c => [...c, v]);
                setNameInput('');
                inputRef.current && inputRef.current.focus();
            };

            const removeName = (i) => setChain(c => c.filter((_, idx) => idx !== i));

            const handleKey = (e) => { if (e.key === 'Enter') addName(); };

            const handleSubmit = () => {
                if (!contact.trim()) { setError('Укажите контакт'); return; }
                if (chain.length < 2) { setError('Добавьте минимум 2 имени'); return; }
                const chainText = chain.join(' → ');
                const body = encodeURIComponent(
                    `Шежіре:\n${chainText}\n\nКонтакт: ${contact}\n\nПримечание: ${note || '—'}`
                );
                window.open(`mailto:shejire@tamgaai.kz?subject=Шежіре на проверку&body=${body}`);
                setSubmitted(true);
            };

            return (
                <div className="fixed inset-0 z-[999] flex items-end md:items-center justify-center p-4"
                    style={{background:'rgba(0,0,0,0.85)', backdropFilter:'blur(8px)'}}>

                            </div>

                        </div>

                            <div className="px-6 py-6 space-y-6">

                                {/* Contact */}
                                <div>
                                    <label className="text-[9px] text-[#C5A55A] tracking-[0.25em] uppercase block mb-2">Контакт (Telegram / телефон / имя)</label>
                                    <input value={contact} onChange={e => { setContact(e.target.value); setError(''); }}

                                {/* Chain builder */}
                                <div>
                                    <label className="text-[9px] text-[#C5A55A] tracking-[0.25em] uppercase block mb-3">Шежіре тізбегі (от себя к предкам)</label>

                                    {/* Input row */}
                                    <div className="flex gap-2 mb-4">

                                            placeholder={chain.length === 0 ? 'Ваше имя...' : `Предок ${chain.length}...`} />
                                        <button onClick={addName}
                                            className="w-12 h-12 rounded-xl border border-[#C5A55A40] text-[#C5A55A] hover:bg-[#C5A55A15] transition-colors flex items-center justify-center text-lg flex-shrink-0">+</button>
                                    </div>

                                    {/* Chain visualization */}
                                    {chain.length > 0 && (
                                        <div className="space-y-0 relative">
                                            <div className="absolute left-4 top-4 bottom-4 w-[1px]"
                                                style={{background:'linear-gradient(to bottom, #C5A55A60, transparent)'}} />

                                                    <div className="w-8 h-8 rounded-full flex-shrink-0 z-10 flex items-center justify-center text-[9px] font-bold"

                                                        style={{background:'#0d0d0d', border:'1px solid #161616'}}>
                                                        <span className="text-sm" style={{color: i === 0 ? '#C5A55A' : '#888'}}>{name}</span>
                                                        <button onClick={() => removeName(i)}

                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                    {chain.length === 0 && (
                                        <div className="text-center py-6 rounded-xl border border-dashed border-[#1a1a1a]">
                                            <div className="text-[#333] text-xs tracking-widest">Добавьте имена последовательно</div>
                                            <div className="text-[9px] text-[#222] mt-1">от себя → к предкам</div>
                                        </div>
                                    )}
                                </div>

                                {/* Note */}
                                <div>
                                    <label className="text-[9px] text-[#555] tracking-[0.25em] uppercase block mb-2">Примечание (необязательно)</label>
                                    <textarea value={note} onChange={e => setNote(e.target.value)} rows={2}
                                        className="w-full bg-[#0d0d0d] border border-[#222] focus:border-[#C5A55A40] rounded-xl px-4 py-3 text-sm outline-none transition placeholder-[#333] resize-none"
                                        placeholder="Дополнительная информация о роде..." />
                                </div>

                                {error && <p className="text-red-500 text-xs text-center">{error}</p>}

                                <button onClick={handleSubmit}
                                    className="w-full gold-pill py-4 rounded-2xl font-bold tracking-[0.3em] uppercase text-sm transition hover:scale-[1.01]">
                                    МОДЕРАТОРҒА ЖІБЕРУ →
                                </button>

                                <p className="text-center text-[9px] text-[#333] tracking-wider">
                                    Проверка занимает 1–3 рабочих дня
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

                            <div>
                                <h2 className="text-3xl md:text-4xl font-serif mb-2">Таңдау сеткасы</h2>
                                <p className="text-[#666] tracking-widest uppercase text-[10px] md:text-xs">Выберите свой род для начала пути</p>
                            </div>
                            <div className="flex flex-wrap gap-2 md:gap-4 mt-6 md:mt-0">
                                {Object.values(ZHUZES).map(z => (
                                    <span key={z} className="text-[10px] text-[#444] border border-[#222] px-3 py-1 rounded-full">{z}</span>
                                ))}
                            </div>
                        </div>

                        {/* Tumalas Grid style */}
                        <div className="space-y-16">
                            <ZhuzSection title={ZHUZES.ULY} list={Object.entries(TRIBES_DB).filter(([_, t]) => t.juz === ZHUZES.ULY)} onSelect={onTribeSelect} />
                            <ZhuzSection title={ZHUZES.ORTA} list={Object.entries(TRIBES_DB).filter(([_, t]) => t.juz === ZHUZES.ORTA)} onSelect={onTribeSelect} />
                            <ZhuzSection title={ZHUZES.KISHI} list={Object.entries(TRIBES_DB).filter(([_, t]) => t.juz === ZHUZES.KISHI)} onSelect={onTribeSelect} />
                        </div>
                    </section>
                </div>
            );
        }

        function ZhuzSection({ title, list, onSelect }) {
            return (
                <div className="group">
                    <h3 className="text-[#C5A55A] text-[10px] md:text-xs font-semibold tracking-[0.3em] md:tracking-[0.5em] uppercase mb-6 md:mb-8 flex items-center gap-4">
                        {title}
                        <div className="h-[1px] flex-1 bg-gradient-to-r from-[#C5A55A40] to-transparent" />
                    </h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4">
                        {list.map(([key, t]) => (
                            <button
                                key={key}
                                onClick={() => onSelect(key)}
                                className="glass-card rounded-2xl p-6 flex flex-col items-center group/card relative overflow-hidden"
                            >
                                <div className="text-3xl text-[#C5A55A] mb-4 tamga-glow group-hover/card:scale-125 transition-transform duration-500">
                                    {t.tamga}
                                </div>
                                <span className="text-xs font-bold tracking-[0.2em] text-white">
                                    {t.name}
                                </span>
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#C5A55A0A] opacity-0 group-hover/card:opacity-100 transition-opacity"></div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // --- Interactive Flow Screens ---

        function InteractiveFlow({ tribeKey, onBack, onTreeFinish }) {
            const [step, setStep] = useState(0); // 0:Story, 1:JetiAta, 2:Mint, 3:Result
            const [userData, setUserData] = useState({ name: "", ancestors: Array(7).fill("") });

            const tribe = TRIBES_DB[tribeKey];

            return (
                <div className="max-w-4xl mx-auto px-6 py-24 min-h-screen content-center">
                    <button onClick={onBack} className="text-[#666] hover:text-[#C5A55A] transition-colors mb-12 flex items-center gap-2 text-xs tracking-widest">
                        ← НАЗАД К СЕТКЕ
                    </button>

                    {step === 0 && <StoryScreen tribe={tribe} onNext={() => setStep(1)} />}
                    {step === 1 && <JetiAtaScreen tribe={tribe} data={userData} onChange={setUserData} onNext={() => setStep(2)} />}
                    {step === 2 && <MintScreen tribe={tribe} data={userData} onNext={() => setStep(3)} />}
                    {step === 3 && <ResultScreen tribe={tribe} data={userData} onRestart={onBack} onShowTree={onTreeFinish} />}
                </div>
            );
        }

        function StoryScreen({ tribe, onNext }) {
            const [tab, setTab] = useState('history');

            return (
                <div className="animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="flex flex-col items-center text-center mb-12">
                        <div className="w-24 h-24 rounded-full border border-[#C5A55A40] flex items-center justify-center text-5xl text-[#C5A55A] tamga-glow mb-6">
                            {tribe.tamga}
                        </div>
                        <h1 className="text-5xl font-serif tracking-widest mb-2">{tribe.name}</h1>
                        <p className="text-[#C5A55A] text-[10px] tracking-[0.5em] uppercase font-bold">{tribe.juz}</p>
                    </div>

                    <div className="glass-card rounded-3xl p-8 mb-12">
                        <p className="text-[#999] text-[10px] tracking-widest uppercase mb-4">Хроники племени</p>
                        <p className="text-xl md:text-2xl font-serif leading-relaxed text-[#eee]">
                            {tribe.story}
                        </p>
                    </div>

                    <button onClick={onNext} className="w-full gold-pill py-5 rounded-2xl font-bold tracking-[0.3em] uppercase transition hover:scale-[1.02] shadow-xl">
                        К верификации Жеті Ата →
                    </button>
                </div>
            );
        }

        function JetiAtaScreen({ tribe, data, onChange, onNext }) {
            const labels = ["Өзің (Ты)", "Әке (Отец)", "Ата (Дед)", "Арғы ата (Прадед)", "Баба (4-е колено)", "Түп ата (5-е колено)", "Тек ата (6-е колено)"];
            const [error, setError] = useState("");

            const validate = () => {
                if (!data.name.trim()) { setError("Пожалуйста, введите свое имя"); return; }
                const filled = data.ancestors.filter(a => a.trim()).length;
                if (filled < 3) { setError("Назовите хотя бы 3 предков для продолжения"); return; }
                onNext();
            };

            return (
                <div className="animate-in fade-in slide-in-from-right-8 duration-500">
                    <h2 className="text-3xl font-serif text-center mb-12">Протокол верификации Наследия</h2>

                    <div className="max-w-md mx-auto space-y-8">
                        <div>
                            <label className="text-[10px] tracking-[0.2em] text-[#C5A55A] block mb-2">ВАШЕ ИМЯ</label>
                            <input
                                value={data.name}
                                onChange={e => onChange({ ...data, name: e.target.value })}
                                className="w-full bg-[#0d0d0d] border border-[#222] rounded-xl px-4 py-3 outline-none focus:border-[#C5A55A80] transition"
                                placeholder="Введите имя..."
                            />
                        </div>

                        <div className="space-y-4 relative">
                            <div className="absolute left-4 top-4 bottom-4 w-[1px] bg-[#222]" />
                            {labels.map((l, i) => (
                                <div key={i} className="flex gap-4 items-center">
                                    <div className={`w-8 h-8 rounded-full flex-shrink-0 z-10 text-[10px] font-bold flex items-center justify-center border transition-colors ${data.ancestors[i] ? 'gold-pill border-[#C5A55A]' : 'bg-black border-[#222] text-[#444]'}`}>
                                        {i + 1}
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-[9px] text-[#555] block uppercase mb-1">{l}</label>
                                        <input
                                            value={data.ancestors[i]}
                                            onChange={e => {
                                                const newA = [...data.ancestors]; newA[i] = e.target.value;
                                                onChange({ ...data, ancestors: newA });
                                            }}
                                            className="w-full bg-transparent border-b border-[#222] py-2 text-sm focus:border-[#C5A55A] outline-none transition"
                                            placeholder={`Имя ${i + 1}-го предка`}
                                        />
                                    </div>
                                </div>
                            ))}
                        </div>

                        {error && <p className="text-red-500 text-xs text-center">{error}</p>}

                        <button onClick={validate} className="w-full gold-pill py-5 rounded-2xl font-bold tracking-[0.3em] uppercase transition hover:scale-[1.02]">
                            ПРОВЕРИТЬ КОД РОДА
                        </button>
                    </div>
                </div>
            );
        }

        function MintScreen({ tribe, data, onNext }) {
            const [progress, setProgress] = useState(0);
            const [status, setStatus] = useState("Инициализация...");

            useEffect(() => {
                const interval = setInterval(() => {
                    setProgress(p => {
                        if (p >= 100) { clearInterval(interval); setTimeout(onNext, 1000); return 100; }
                        if (p < 30) setStatus("Запись в IPFS...");
                        else if (p < 60) setStatus("Генерация смарт-контракта...");
                        else if (p < 90) setStatus("Верификация на Polygon...");
                        else setStatus("Минтинг завершен!");
                        return p + Math.random() * 10;
                    });
                }, 400);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="text-center py-24">
                    <div className="w-48 h-48 mx-auto mb-12 relative">
                        <div className="absolute inset-0 border-4 border-[#C5A55A20] rounded-full"></div>
                        <div className="absolute inset-0 border-t-4 border-[#C5A55A] rounded-full animate-spin"></div>
                        <div className="absolute inset-0 flex items-center justify-center text-4xl text-[#C5A55A] tamga-glow">
                            {tribe.tamga}
                        </div>
                    </div>
                    <h2 className="text-3xl font-serif mb-4">Чеканка SBT Токена</h2>
                    <p className="text-[#666] mb-12 tracking-widest uppercase text-xs">{status}</p>

                    <div className="max-w-xs mx-auto h-1 bg-[#1a1a1a] rounded-full overflow-hidden">
                        <div className="h-full bg-[#C5A55A] shadow-[0_0_10px_rgba(197,165,90,0.8)] transition-all" style={{ width: `${progress}%` }}></div>
                    </div>
                </div>
            );
        }

        function ResultScreen({ tribe, data, onRestart, onShowTree }) {
            const txHash = `0x${Array.from({ length: 32 }, () => Math.floor(Math.random() * 16).toString(16)).join('')}`;

            return (
                <div className="animate-in zoom-in-95 duration-700">
                    <div className="glass-card rounded-[2.5rem] p-1 scale-105 rotate-1 mb-16 relative">
                        <div className="bg-[#000] rounded-[2.4rem] p-8 text-center overflow-hidden">
                            {/* Decorative Gold Header */}
                            <div className="absolute top-0 inset-x-0 h-32 bg-gradient-to-b from-[#C5A55A1A] to-transparent"></div>

                            <div className="relative z-10 pt-8">
                                <div className="text-7xl text-[#C5A55A] tamga-glow font-serif mb-6">{tribe.tamga}</div>
                                <h1 className="text-4xl font-serif tracking-tight mb-2 uppercase">{tribe.name}</h1>
                                <p className="text-[#C5A55A] text-[10px] tracking-[0.5em] mb-8 uppercase font-bold">{tribe.juz}</p>

                                <div className="border-t border-b border-[#1a1a1a] py-6 mb-8 text-left space-y-3">
                                    <div className="flex justify-between">
                                        <span className="text-[10px] text-[#444] uppercase tracking-widest">Владелец</span>
                                        <span className="text-sm font-semibold">{data.name}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-[10px] text-[#444] uppercase tracking-widest">Глубина</span>
                                        <span className="text-sm font-semibold">{data.ancestors.filter(a => a.trim()).length}/7 Ата</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-[10px] text-[#444] uppercase tracking-widest">Тип токена</span>
                                        <span className="text-sm font-semibold text-[#4ade80]">Soulbound (SBT)</span>
                                    </div>
                                </div>

                                <div className="bg-[#0a0a0a] rounded-xl p-4 mb-4 text-left border border-[#1a1a1a]">
                                    <span className="text-[10px] text-[#444] uppercase block mb-1">Transaction Hash</span>
                                    <code className="text-[10px] text-[#555] break-all">{txHash}</code>
                                </div>
                                <p className="text-[10px] text-[#444] tracking-widest uppercase mb-6">Verified by Shejire AI Consensus v2.0</p>

                                <button onClick={onShowTree} className="w-full bg-[#4ade8020] border border-[#4ade8040] text-[#4ade80] py-4 rounded-xl font-bold tracking-[0.2em] uppercase transition hover:bg-[#4ade8030] mb-4">
                                    Посмотреть мое древо
                                </button>
                            </div>
                        </div>
                    </div>

                    <button onClick={onRestart} className="w-full border border-[#222] hover:border-[#C5A55A40] text-[#666] hover:text-[#C5A55A] py-5 rounded-2xl font-bold tracking-[0.3em] uppercase transition">
                        ВЕРНУТЬСЯ В СТЕПЬ
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
