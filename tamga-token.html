<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAMĠA Token</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Cinzel', serif;
      gap: 60px;
      padding: 40px;
    }

    .token-wrapper {
      display: flex;
      gap: 60px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .token-label {
      color: #8B6914;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      margin-top: 16px;
    }

    .token-container { text-align: center; }
  </style>
</head>
<body>

<div class="token-wrapper">
  <!-- Large Token -->
  <div class="token-container">
    <svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Dark radial gradient for coin face -->
        <radialGradient id="coinBg" cx="50%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#1a1a12"/>
          <stop offset="40%" stop-color="#0d0d08"/>
          <stop offset="100%" stop-color="#050505"/>
        </radialGradient>

        <!-- Gold gradient for rim -->
        <linearGradient id="rimGold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#E8CC7A"/>
          <stop offset="20%" stop-color="#C5A550"/>
          <stop offset="40%" stop-color="#F0D882"/>
          <stop offset="60%" stop-color="#9A7520"/>
          <stop offset="80%" stop-color="#D4A840"/>
          <stop offset="100%" stop-color="#7A5510"/>
        </linearGradient>

        <!-- Gold for text and ornaments -->
        <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#F0D882"/>
          <stop offset="30%" stop-color="#C5A550"/>
          <stop offset="70%" stop-color="#D4B060"/>
          <stop offset="100%" stop-color="#8B6914"/>
        </linearGradient>

        <!-- Subtle gold shimmer -->
        <linearGradient id="goldShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#E8CC7A" stop-opacity="0.9"/>
          <stop offset="50%" stop-color="#C5A550" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#8B6914" stop-opacity="0.9"/>
        </linearGradient>

        <!-- Circle path for text -->
        <path id="topCircleText" d="M 210,210 m -148,0 a 148,148 0 1,1 296,0" />
        <path id="bottomCircleText" d="M 210,210 m -142,0 a 142,142 0 0,0 284,0" />

        <!-- Glow filter -->
        <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Subtle drop shadow -->
        <filter id="tokenShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#C5A550" flood-opacity="0.25"/>
        </filter>

        <!-- Clip circle -->
        <clipPath id="coinClip">
          <circle cx="210" cy="210" r="200"/>
        </clipPath>
      </defs>

      <!-- ── OUTER SHADOW RING ── -->
      <circle cx="210" cy="210" r="205" fill="none" stroke="#C5A550" stroke-width="0.5" stroke-opacity="0.2" filter="url(#tokenShadow)"/>

      <!-- ── COIN EDGE / RIM ── -->
      <circle cx="210" cy="210" r="203" fill="url(#rimGold)"/>

      <g stroke="#0d0d08" stroke-width="1.2" opacity="0.6">

        <line x1="210" y1="8" x2="210" y2="16" transform="rotate(60 210 210)"/>

        <line x1="210" y1="8" x2="210" y2="16" transform="rotate(250 210 210)"/>
        <line x1="210" y1="8" x2="210" y2="16" transform="rotate(255 210 210)"/>
        <line x1="210" y1="8" x2="210" y2="16" transform="rotate(260 210 210)"/>

      </g>

      <!-- ── COIN FACE ── -->
      <circle cx="210" cy="210" r="195" fill="url(#coinBg)"/>

      <!-- ── OUTER DECORATIVE RING (engraved look) ── -->
      <circle cx="210" cy="210" r="190" fill="none" stroke="url(#goldShimmer)" stroke-width="1.5" stroke-opacity="0.8"/>
      <circle cx="210" cy="210" r="186" fill="none" stroke="url(#goldShimmer)" stroke-width="0.5" stroke-opacity="0.5"/>

      <!-- ── TAMGA SYMBOLS RING ── -->
      <!-- 24 tribal tamga symbols arranged in circle at r=168 -->
      <g fill="url(#goldShimmer)" stroke="none" opacity="0.85" font-size="13" text-anchor="middle" dominant-baseline="middle">
        <!-- Tamga-style symbols using unicode/SVG paths, rotated around center -->

        <!-- Symbol 1 — Aries/Ram horn -->
        <text transform="rotate(0 210 210) translate(0,-168)" x="210" y="210" font-size="11">♈</text>
        <!-- Symbol 2 — Triskelion/spiral -->
        <text transform="rotate(15 210 210) translate(0,-168)" x="210" y="210" font-size="10">ꚞ</text>
        <!-- Symbol 3 — Arrow up -->
        <text transform="rotate(30 210 210) translate(0,-168)" x="210" y="210" font-size="12">⌅</text>
        <!-- Symbol 4 — Fork -->
        <text transform="rotate(45 210 210) translate(0,-168)" x="210" y="210" font-size="11">Ψ</text>
        <!-- Symbol 5 — Cross -->
        <text transform="rotate(60 210 210) translate(0,-168)" x="210" y="210" font-size="12">⊕</text>
        <!-- Symbol 6 — Lambda -->
        <text transform="rotate(75 210 210) translate(0,-168)" x="210" y="210" font-size="12">Λ</text>
        <!-- Symbol 7 — Rune -->
        <text transform="rotate(90 210 210) translate(0,-168)" x="210" y="210" font-size="12">ᚱ</text>
        <!-- Symbol 8 — Delta -->
        <text transform="rotate(105 210 210) translate(0,-168)" x="210" y="210" font-size="11">△</text>
        <!-- Symbol 9 — Epsilon -->
        <text transform="rotate(120 210 210) translate(0,-168)" x="210" y="210" font-size="12">Ξ</text>
        <!-- Symbol 10 — Sigma -->
        <text transform="rotate(135 210 210) translate(0,-168)" x="210" y="210" font-size="12">Σ</text>
        <!-- Symbol 11 — Thor rune -->
        <text transform="rotate(150 210 210) translate(0,-168)" x="210" y="210" font-size="12">ᚦ</text>
        <!-- Symbol 12 — Ohm -->
        <text transform="rotate(165 210 210) translate(0,-168)" x="210" y="210" font-size="12">Ω</text>
        <!-- Symbol 13 — Fish/Pisces -->
        <text transform="rotate(180 210 210) translate(0,-168)" x="210" y="210" font-size="11">♓</text>
        <!-- Symbol 14 -->
        <text transform="rotate(195 210 210) translate(0,-168)" x="210" y="210" font-size="11">ᛏ</text>
        <!-- Symbol 15 -->
        <text transform="rotate(210 210 210) translate(0,-168)" x="210" y="210" font-size="12">☽</text>
        <!-- Symbol 16 -->
        <text transform="rotate(225 210 210) translate(0,-168)" x="210" y="210" font-size="11">⊗</text>
        <!-- Symbol 17 -->
        <text transform="rotate(240 210 210) translate(0,-168)" x="210" y="210" font-size="12">Φ</text>
        <!-- Symbol 18 -->
        <text transform="rotate(255 210 210) translate(0,-168)" x="210" y="210" font-size="11">ᚦ</text>
        <!-- Symbol 19 -->
        <text transform="rotate(270 210 210) translate(0,-168)" x="210" y="210" font-size="12">⌘</text>
        <!-- Symbol 20 -->
        <text transform="rotate(285 210 210) translate(0,-168)" x="210" y="210" font-size="11">Ж</text>
        <!-- Symbol 21 -->

        <!-- Symbol 22 -->

        <!-- Symbol 24 -->
        <text transform="rotate(345 210 210) translate(0,-168)" x="210" y="210" font-size="12">Ŋ</text>
      </g>

      <!-- Inner dark disc -->

      <!-- Bottom -->
